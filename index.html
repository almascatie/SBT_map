        { id: "LABKESMAS_SBT", name: "Pembangunan Baru Labkesmas Kabupaten", lat: -3.098125, lng: 130.472816, alamat: "Desa Kampung Wailola Kecil, Kec. Bula, Kab. SBT", type: "labkesmas", details: "Laboratorium Kesehatan Masyarakat Kabupaten", labelDir: "right" }
    ];

    var groups = {
        'rsud': { title: 'Rumah Sakit (RSUD)', color: '#e53e3e', icon: iconRS },
        'puskesmas': { title: 'Puskesmas Eksisting', color: '#3182ce', icon: iconPuskesmas },
        'usulan': { title: 'Usulan Faskes Baru', color: '#319795', icon: iconUsulan },
        'relokasi': { title: 'Usulan Relokasi Puskesmas', color: '#dd6b20', icon: iconRelokasi },
        'labkesmas': { title: 'Labkesmas Kabupaten', color: '#008080', icon: iconLabkesmas }
    };

    var container = document.getElementById('list-container');
    var allMarkers = [];

    var ClearRouteControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function (map) {
            var btn = L.DomUtil.create('button', 'clear-route-btn');
            btn.innerHTML = '❌ Bersihkan Garis Jalur';
            btn.onclick = function() { clearAllRoutes(); };
            return btn;
        }
    });
    map.addControl(new ClearRouteControl());

    function clearAllRoutes() {
        currentRoutes.forEach(function(r) { map.removeLayer(r); });
        currentRoutes = [];
    }

    window.drawReferralLine = function(puskemasId) {
        clearAllRoutes();
        if(!geojsonData) {
            alert("Data rute transportasi riil belum selesai dimuat. Silakan coba sesaat lagi.");
            return;
        }

        var pusk = dataFaskes.find(d => d.id === puskemasId);
        if(!pusk || !pusk.ruteName) return;

        var targetFeature = geojsonData.features.find(f => f.properties && f.properties.name === pusk.ruteName);
        
        if(targetFeature) {
            var dynamicColor = getColorFromString(pusk.ruteName);

            var geojsonLayer = L.geoJSON(targetFeature, {
                style: {
                    color: dynamicColor,
                    weight: 5,
                    opacity: 0.95
                }
            }).addTo(map);

            currentRoutes.push(geojsonLayer);
            map.fitBounds(geojsonLayer.getBounds(), { padding: [80, 80], maxZoom: 12 });
        } else {
            console.warn("Jalur tidak ditemukan di file GeoJSON: " + pusk.ruteName);
        }
    };

    window.drawAllRsNetwork = function(rsName) {
        clearAllRoutes();
        if(!geojsonData) {
            alert("Data rute belum selesai dimuat.");
            return;
        }

        var bounds = L.latLngBounds();
        var hasRoute = false;

        var targetPuskesmas = dataFaskes.filter(d => d.rujukan && d.rujukan.toUpperCase() === rsName.toUpperCase());

        targetPuskesmas.forEach(function(pusk) {
            if(!pusk.ruteName) return;

            var targetFeature = geojsonData.features.find(f => f.properties && f.properties.name === pusk.ruteName);
            if(targetFeature) {
                var dynamicColor = getColorFromString(pusk.ruteName);

                var geojsonLayer = L.geoJSON(targetFeature, {
                    style: {
                        color: dynamicColor,
                        weight: 4,
                        opacity: 0.85
                    }
                }).addTo(map);

                currentRoutes.push(geojsonLayer);
                bounds.extend(geojsonLayer.getBounds());
                hasRoute = true;
            }
        });

        var rsPusk = dataFaskes.find(d => d.name.toUpperCase() === rsName.toUpperCase());
        if(rsPusk && rsPusk.ruteName) {
            var rsFeature = geojsonData.features.find(f => f.properties && f.properties.name === rsPusk.ruteName);
            if(rsFeature) {
                var dynamicColor = getColorFromString(rsPusk.ruteName);
                var geojsonLayer = L.geoJSON(rsFeature, {
                    style: { color: dynamicColor, weight: 4.5, opacity: 0.9, dashArray: '5,5' }
                }).addTo(map);
                currentRoutes.push(geojsonLayer);
                bounds.extend(geojsonLayer.getBounds());
                hasRoute = true;
            }
        }

        if(hasRoute) {
            map.fitBounds(bounds, { padding: [60, 60] });
        }
    };

    window.toggleAccordion = function(element) {
        var item = element.parentElement;
        item.classList.toggle('active');
    };

    Object.keys(groups).forEach(function(type) {
        var filtered = dataFaskes.filter(item => item.type === type);
        if (filtered.length > 0) {
            var accItem = document.createElement('div');
            accItem.className = 'accordion-item';

            var titleDiv = document.createElement('div');
            titleDiv.className = 'section-title';
            titleDiv.innerText = groups[type].title;
            titleDiv.setAttribute('onclick', 'toggleAccordion(this)');
            accItem.appendChild(titleDiv);

            var contentDiv = document.createElement('div');
            contentDiv.className = 'section-content';

            filtered.forEach(function(item) {
                var popupContent = '<div class="popup-title">' + item.name + '</div>' +
                                   '<div class="popup-content"><b>Alamat:</b> ' + item.alamat + '<br>';

                if (item.jarak && item.waktu && (item.type === "puskesmas" || item.type === "usulan" || item.type === "relokasi")) {
                    popupContent += '<div class="popup-referral-box">' +
                                    '<b>➔ Rujukan Ke:</b> ' + item.rujukan + '<br>' +
                                    '<b>⏱️ Jarak Tempuh:</b> ' + item.jarak + '<br>' +
                                    '<b>⏳ Waktu Tempuh:</b> ' + item.waktu + '</div>' +
                                    `<button class="btn-action-popup" onclick="drawReferralLine('${item.id}')">Tampilkan Jalur Rujukan 🗺️</button>`;
                }

                if (item.type === "rsud") {
                    popupContent += `<button class="btn-action-popup btn-action-rs" onclick="drawAllRsNetwork('${item.name}')">Tampilkan Semua Puskesmas Rujukan 🌐</button>`;
                }

                if(item.details) {
                    popupContent += '<b>Info:</b> ' + item.details + '<br>';
                }
                popupContent += '<span style="font-size:10px; color:#aaa; display:block; margin-top:5px;"><b>Koordinat:</b> ' + item.lat + ', ' + item.lng + '</span></div>';

                // Format nama singkat agar label di peta ringkas & mudah dibaca
                var shortName = item.name.replace("PUSKESMAS ", "Pk. ")
                                         .replace("RELOKASI PUSKESMAS ", "Relokasi Pk. ")
                                         .replace("USULAN PUSKESMAS BARU DI KEC. ", "Usulan Pk. ");

                var labelDirection = item.labelDir || 'right';
                var xOffset = (labelDirection === 'left') ? -12 : 12;

                var marker = L.marker([item.lat, item.lng], {icon: groups[type].icon})
                              .bindPopup(popupContent)
                              .bindTooltip(shortName, {
                                  permanent: true,
                                  direction: labelDirection,
                                  offset: [xOffset, -12],
                                  className: 'custom-map-label'
                              })
                              .addTo(map);

                markerMap[item.id] = marker;
                allMarkers.push(marker);

                var itemDiv = document.createElement('div');
                itemDiv.className = 'faskes-item';
                itemDiv.onclick = function() {
                    moveToLocation(item.lat, item.lng, item.id);
                };

                itemDiv.innerHTML = `
                    <div class="faskes-icon-dot" style="background: ${groups[type].color}"></div>
                    <div class="faskes-info">
                        <span class="faskes-name">${item.name}</span>
                        <span class="faskes-addr">${item.alamat}</span>
                    </div>
                `;
                contentDiv.appendChild(itemDiv);
            });

            accItem.appendChild(contentDiv);
            container.appendChild(accItem);
        }
    });

    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        var btnText = document.getElementById('btn-text');
        if (sidebar.classList.contains('active')) {
            sidebar.classList.remove('active');
            btnText.innerText = 'Lihat Daftar Faskes';
        } else {
            sidebar.classList.add('active');
            btnText.innerText = 'Lihat Peta Full';
        }
        setTimeout(function(){ map.invalidateSize(); }, 350);
    }

    function moveToLocation(lat, lng, id) {
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('btn-text').innerText = 'Lihat Daftar Faskes';
        }

        map.flyTo([lat, lng], 14, {
            animate: true,
            duration: 1.2
        });

        setTimeout(function() {
            if(markerMap[id]) {
                markerMap[id].openPopup();
            }
        }, 400);
    }

    var baseMaps = {
        "Satelit (Esri)": satellite,
        "Peta Standar (OSM)": osm
    };
    L.control.layers(baseMaps, null, {collapsed: window.innerWidth <= 768}).addTo(map);

    setTimeout(function(){
        map.invalidateSize();
        if(allMarkers.length > 0) {
            var group = new L.featureGroup(allMarkers);
            // map.fitBounds(group.getBounds().pad(0.1));
        }
    }, 300);
</script>
</body>
</html>
